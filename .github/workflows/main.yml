name: Build Job
on: 
  push:
    branches: 
      - main
  #pull_request:
  #  branches:
  #    - main
    

  #pull_request:
  #  branches:
  #    - main
      
  #workflow_dispatch:

  #schedule:
  #  - cron: "* * * * *" #Min Hour Day Month weekday

permissions:
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Maven Build
        run: mvn install

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-app
          path: target/*.war

      - name: notify if build fails
        if: failure()
        run: echo "Build is failed."


  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Run tests on main branch
        run: mvn test

      - name: Checkstyle
        run: mvn checkstyle:checkstyle